<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#16181d" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>100PRESSÃO · Draft House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Barlow:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!--
      Dados estruturados (schema.org) — site-wide, por isso ficam estáticos
      aqui em vez de por rota via Helmet. Morada e telefone confirmados em
      src/pages/Contato.jsx (2026-07-12). Horário usa o fallback de
      src/lib/horario.js — o horário real é editável no /admin e pode
      divergir deste JSON-LD; atualizar aqui manualmente se mudar de forma
      permanente (não é lido do Supabase em build-time).
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BarOrPub",
        "name": "100PRESSÃO",
        "@id": "https://www.100pressao.pt",
        "url": "https://www.100pressao.pt",
        "telephone": "+351935995011",
        "email": "geral@100pressao.pt",
        "priceRange": "€€",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Praceta Eugénio de Castro, Loja 6",
          "addressLocality": "Carnaxide",
          "postalCode": "2790-072",
          "addressRegion": "Oeiras",
          "addressCountry": "PT"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "08:00",
            "closes": "12:00"
          }
        ],
        "servesCuisine": ["Portuguesa", "Brasileira"]
      }
    </script>
    <!--
      Google Analytics 4 com Consent Mode v2 (RGPD/ePrivacy) — o script
      pode carregar sempre, mas arranca com tudo "denied": não grava
      cookies de identificação enquanto o visitante não aceitar no banner
      (ver src/components/ConsentBanner.jsx e src/lib/analytics.js).
      send_page_view desligado porque é uma SPA — o Layout.jsx envia
      page_view manualmente a cada mudança de rota.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KLXQVNJZ5H"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-KLXQVNJZ5H', { send_page_view: false });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
